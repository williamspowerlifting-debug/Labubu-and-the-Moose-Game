<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labubu & Moose Adventure</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="menu">
    <h1>Labubu & Moose Adventure</h1>

    <div class="character-select">
      <button onclick="selectCharacter('labubu')">Play as Labubu</button>
      <button onclick="selectCharacter('moose')">Play as Moose</button>
    </div>

    <p>
      Controls:<br>
      Arrow Keys = Move<br>
      Space = Jump
    </p>
  </div>

  <canvas id="game"></canvas>

  <script src="game.js"></script>
</body>
</html>
